name: Build OT Calculator EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole `
            --add-data "index.html;." `
            --add-data "assets;assets" `
            --add-data "src;src" `
            --name "OT_Calculator" `
            launcher.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OT_Calculator_EXE
          path: dist/OT_Calculator.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "OT Calculator v1.0.${{ github.run_number }}"
          body: |
            ## OT Calculator
            **Developed by Mainul Islam**

            ### Download করুন
            নিচে `OT_Calculator.exe` ফাইলটা download করুন।
            Double-click করলেই চলবে — Python লাগবে না!
          files: dist/OT_Calculator.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
